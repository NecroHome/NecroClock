services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: necro_clock_api

    restart: unless-stopped

    ports:
      - "6004:8080"

    environment:
      ConnectionStrings__DefaultConnection: "Server=mariadb_local;Port=3306;Database=NecroClock;User=necro_clock;Password=thiago123;"
      TZ: "America/Sao_Paulo"

    networks:
      - necro_network

networks:
  necro_network:
    external: true